<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <title>Streamory — Profil public</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 id="siteTitle" style="cursor:pointer;" onclick="window.location.href='app.html'">Streamory</h1>
      </div>
      <button class="icon-button" id="backButton" type="button" aria-label="Retour" onclick="history.back()">×</button>
    </header>

    <main>
      <section class="library" style="padding:16px 24px;min-height:auto;">
        <div class="profile-summary">
          <div style="display:flex;align-items:center;gap:18px;min-width:0;">
            <div style="width:64px;height:64px;flex-shrink:0;border-radius:50%;background:#1b1e24;display:flex;align-items:center;justify-content:center;font-size:30px;">👤</div>
            <div style="display:flex;align-items:center;min-width:0;">
              <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                <h2 id="publicUsername" style="margin:0;overflow-wrap:anywhere;">Profil</h2>
                <span id="publicCountryFlag" style="font-size:28px;"></span>
              </div>
            </div>
          </div>
          <span class="friend-count-button" id="publicFriendCount">0 ami</span>
        </div>
        <div class="profile-actions">
          <button class="primary-button" id="addFriendButton" type="button" hidden>Ajouter en ami</button>
          <p class="message" id="publicProfileMessage"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user.js"></script>
</body>
</html>
