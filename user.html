<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <title>Streamory — Profil public</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 id="siteTitle" style="cursor:pointer;" onclick="window.location.href='app.html'">Streamory</h1>
      </div>
      <div class="header-actions" id="ownProfileActions" hidden>
        <button class="icon-button notification-button" id="notificationsButton" type="button" aria-label="Notifications" hidden>🔔<span id="notificationsBadge" class="notification-badge" hidden>0</span></button>
        <button class="icon-button" id="ownProfileButton" type="button" aria-label="Mon profil" style="width:44px;height:44px;border-radius:12px;background:#1a1d22;display:flex;align-items:center;justify-content:center;">👤</button>
      </div>
      <button class="icon-button" id="backButton" type="button" aria-label="Retour" onclick="history.back()">×</button>
    </header>

    <main>
      <section class="library" style="padding:16px 24px;min-height:auto;">
        <div class="profile-summary">
          <div style="display:flex;align-items:center;gap:18px;min-width:0;">
            <div style="width:64px;height:64px;flex-shrink:0;border-radius:50%;background:#1b1e24;display:flex;align-items:center;justify-content:center;font-size:30px;">👤</div>
            <div style="display:flex;align-items:center;min-width:0;">
              <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                <h2 id="publicUsername" style="margin:0;overflow-wrap:anywhere;">Profil</h2>
                <span id="publicCountryFlag" style="font-size:28px;"></span>
              </div>
            </div>
          </div>
          <button class="friend-count-button" id="publicFriendCount" type="button" disabled>0 ami</button>
        </div>
        <div class="profile-actions">
          <p class="message" id="publicProfileMessage"></p>
        </div>
      </section>
    </main>
  </div>

  <dialog class="settings-dialog" id="notificationsDialog">
    <form method="dialog" class="settings-content">
      <div class="section-title">
        <h2>Notifications</h2>
        <button class="icon-button" value="close" aria-label="Fermer">×</button>
      </div>
      <div class="social-list" id="notificationsList"></div>
    </form>
  </dialog>

  <dialog class="settings-dialog" id="friendsDialog">
    <form method="dialog" class="settings-content">
      <div class="section-title">
        <h2>Amis</h2>
        <button class="icon-button" value="close" aria-label="Fermer">×</button>
      </div>
      <div class="friend-add-box">
        <label>Ajouter un ami
          <div class="search-row">
            <input id="friendSearchInput" type="search" placeholder="Display name">
            <button class="primary-button" id="friendSearchButton" type="button">Chercher</button>
          </div>
        </label>
        <p class="message" id="friendSearchMessage"></p>
        <div class="social-list" id="friendSearchResults"></div>
      </div>
      <div class="social-list" id="friendsList"></div>
    </form>
  </dialog>

  <dialog class="settings-dialog" id="removeFriendDialog">
    <form method="dialog" class="settings-content">
      <div class="section-title">
        <h2>Supprimer l'ami</h2>
        <button class="icon-button" value="close" aria-label="Fermer">×</button>
      </div>
      <p class="hint" id="removeFriendMessage">Retirer cet utilisateur de tes amis ?</p>
      <button class="primary-button danger-button" id="confirmRemoveFriendButton" type="button">Confirmer</button>
      <button class="secondary-button" value="close" type="submit">Annuler</button>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="user.js"></script>
</body>
</html>
