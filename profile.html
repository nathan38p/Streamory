<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050607">
  <title>Streamory — Profil</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1 id="siteTitle" style="cursor:pointer;" onclick="window.location.href='app.html'">Streamory</h1>
      </div>
      <div class="header-actions">
        <button class="icon-button notification-button" id="notificationsButton" type="button" aria-label="Notifications" hidden>🔔<span id="notificationsBadge" class="notification-badge" hidden>0</span></button>
        <button class="icon-button" id="settingsButton" type="button" style="width:44px;height:44px;border-radius:12px;background:#101215;display:flex;align-items:center;justify-content:center;">⚙️</button>
      </div>
    </header>

    <main>
      <section class="library" style="padding:16px 24px;min-height:auto;">
        <div class="profile-summary">
          <div style="display:flex;align-items:center;gap:18px;min-width:0;">
            <div style="display:flex;align-items:center;min-width:0;">
              <div style="display:flex;align-items:center;gap:10px;min-width:0;">
                <h2 id="profileUsername" style="margin:0;overflow-wrap:anywhere;">Nom d'utilisateur</h2>
                <span id="profileCountryFlag" style="font-size:28px;">🇫🇷</span>
              </div>
            </div>
          </div>
          <button class="friend-count-button" id="friendsButton" type="button">0 ami</button>
        </div>
      </section>

      <section class="library profile-rail-card">
        <div class="section-title">
          <h2>Séries</h2>
          <button class="icon-button" type="button" aria-label="Voir toutes les séries" onclick="window.location.href='series.html'">→</button>
        </div>
        <div class="profile-poster-rail" id="profileSeriesRail"></div>
        <p class="message profile-rail-empty" id="profileSeriesEmpty">Aucune série suivie pour le moment.</p>
      </section>

      <section class="library profile-rail-card">
        <div class="section-title">
          <h2>Films</h2>
          <button class="icon-button" type="button" aria-label="Voir tous les films" onclick="window.location.href='movies.html'">→</button>
        </div>
        <div class="profile-poster-rail" id="profileMoviesRail"></div>
        <p class="message profile-rail-empty" id="profileMoviesEmpty">Aucun film ajouté pour le moment.</p>
      </section>
    </main>
  </div>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog" class="settings-content">
      <div class="section-title">
        <h2>Réglages du profil</h2>
        <button class="icon-button" value="close">×</button>
      </div>

      <label>Display name
        <input id="editUsername" type="text" inputmode="latin" minlength="3" maxlength="28" pattern="[a-z0-9._-]{3,28}">
      </label>

      <label>Pays
        <select id="editCountry"></select>
      </label>

      <label>Email
        <input id="editEmail" type="email">
      </label>

      <div class="password-change-row">
        <label>Ancien mot de passe
          <input id="editCurrentPassword" type="password" autocomplete="current-password">
        </label>
        <span class="password-arrow">→</span>
        <label>Nouveau mot de passe
          <input id="editNewPassword" type="password" autocomplete="new-password">
        </label>
      </div>

      <div class="tvtime-import-box">
        <div>
          <h3>Import data from TVTime</h3>
          <p class="hint">Choisis l'export films et l'export séries JSON de TVTime.</p>
        </div>
        <label>Fichier films
          <input id="tvtimeMoviesFile" type="file" accept="application/json,.json">
        </label>
        <label>Fichier séries
          <input id="tvtimeSeriesFile" type="file" accept="application/json,.json">
        </label>
        <button class="secondary-button" id="importTvtimeButton" type="button">Importer data from TVTime</button>
        <p class="message" id="tvtimeImportMessage"></p>
      </div>

      <button class="primary-button" id="saveProfileButton" type="button">Enregistrer</button>
      <button class="secondary-button danger-button" id="logoutButton" type="button">Se déconnecter</button>
    </form>
  </dialog>

  <dialog id="friendsDialog" class="settings-dialog">
    <form method="dialog" class="settings-content">
      <div class="section-title">
        <h2>Amis</h2>
        <button class="icon-button" value="close" aria-label="Fermer">×</button>
      </div>

      <div class="friend-add-box">
        <label>Ajouter un ami
          <div class="search-row">
            <input id="friendSearchInput" type="search" placeholder="Display name">
            <button class="primary-button" id="friendSearchButton" type="button">Chercher</button>
          </div>
        </label>
        <p class="message" id="friendSearchMessage"></p>
        <div class="social-list" id="friendSearchResults"></div>
      </div>

      <div class="social-list" id="friendsList"></div>
    </form>
  </dialog>

  <dialog id="notificationsDialog" class="settings-dialog">
    <form method="dialog" class="settings-content">
      <div class="section-title">
        <h2>Notifications</h2>
        <button class="icon-button" value="close" aria-label="Fermer">×</button>
      </div>
      <div class="social-list" id="notificationsList"></div>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="profile.js"></script>
</body>
</html>
