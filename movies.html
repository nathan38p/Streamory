

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Films — Streamory</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="app-shell wide-shell">
    <section class="library">
      <div class="section-title">
        <h1>Films</h1>
        <button class="icon-button" type="button" aria-label="Retour au profil" onclick="window.location.href='profile.html'">←</button>
      </div>

	      <p class="muted" id="moviesStatus">Chargement des films…</p>
	      <div class="series-grid" id="moviesList"></div>
	      <div class="scroll-sentinel" id="moviesScrollSentinel" aria-hidden="true"></div>
	    </section>
	  </main>

  <script>
	    const moviesList = document.getElementById("moviesList");
	    const moviesStatus = document.getElementById("moviesStatus");
	    const moviesScrollSentinel = document.getElementById("moviesScrollSentinel");
	    const PAGE_SIZE = 40;
	    let moviesClient = null;
	    let moviesUser = null;
	    let moviesOffset = 0;
	    let hasMoreMovies = true;
	    let isLoadingMovies = false;

    function posterPlaceholder(title = "Sans titre") {
      const lines = splitPlaceholderTitle(title);
      const lineHeight = 18;
      const startY = 120 - ((lines.length - 1) * lineHeight) / 2;
      const text = lines.map((line, index) => (
        `<text x="80" y="${startY + index * lineHeight}" text-anchor="middle">${escapeSvgText(line)}</text>`
      )).join("");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="240" viewBox="0 0 160 240"><rect width="160" height="240" fill="#20242a"/><g fill="#f4f6fb" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">${text}</g></svg>`;
      return `data:image/svg+xml,${encodeURIComponent(svg)}`;
    }

    function splitPlaceholderTitle(value) {
      const words = String(value || "Sans titre").trim().split(/\s+/);
      const lines = [];
      let line = "";
      words.forEach((word) => {
        const nextLine = line ? `${line} ${word}` : word;
        if (nextLine.length <= 14) {
          line = nextLine;
          return;
        }
        if (line) lines.push(line);
        line = word;
      });
      if (line) lines.push(line);
      return (lines.length ? lines : ["Sans titre"]).slice(0, 4);
    }

    function escapeSvgText(value) {
      return String(value).replace(/[&<>"']/g, (char) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]
      ));
    }

    function createMovieCard(item) {
      const figure = document.createElement("figure");
      figure.className = "profile-poster-item";

	      const image = document.createElement("img");
	      image.dataset.itemId = String(item.id || "");
	      image.src = item.image_url || posterPlaceholder(item.title);
	      image.alt = item.title ? `Affiche de ${item.title}` : "Affiche";
	      image.loading = "lazy";
	      image.addEventListener("error", () => {
	        image.src = posterPlaceholder(item.title);
	        refreshPosterForItem(item, "movie", image);
	      }, { once: true });

      const link = document.createElement("a");
      link.href = `film.html?id=${encodeURIComponent(item.tvdb_id)}`;
      link.setAttribute("aria-label", `Voir ${item.title || "ce film"}`);
      link.append(image);

      figure.append(link);
      return figure;
    }

    function getSupabaseClient() {
      if (window.streamoryClient) return window.streamoryClient;
      if (window.supabaseClient) return window.supabaseClient;
      if (window.profileClient) return window.profileClient;

      const url = window.CONFIG?.SUPABASE_URL;
      const key = window.CONFIG?.SUPABASE_ANON_KEY;

      if (!window.supabase || !url || !key) return null;

      const client = window.supabase.createClient(url, key);
      window.streamoryClient = client;
      window.supabaseClient = client;
      return client;
    }

	    async function loadMovies() {
	      moviesClient = getSupabaseClient();

	      if (!moviesClient) {
	        moviesStatus.textContent = "Connexion Supabase introuvable.";
	        return;
	      }

	      const { data: authData, error: authError } = await moviesClient.auth.getUser();
	      moviesUser = authData?.user;

	      if (authError || !moviesUser) {
	        window.location.href = "index.html";
	        return;
	      }

	      moviesList.innerHTML = "";
	      moviesOffset = 0;
	      hasMoreMovies = true;
	      observeMoviesScroll();
	      await loadNextMoviesPage();
	    }

	    function observeMoviesScroll() {
	      if (!moviesScrollSentinel || !("IntersectionObserver" in window)) return;
	      const observer = new IntersectionObserver((entries) => {
	        if (entries.some((entry) => entry.isIntersecting)) loadNextMoviesPage();
	      }, { rootMargin: "600px 0px" });
	      observer.observe(moviesScrollSentinel);
	    }

	    async function loadNextMoviesPage() {
	      if (isLoadingMovies || !hasMoreMovies || !moviesClient || !moviesUser) return;
	      isLoadingMovies = true;
	      moviesStatus.textContent = moviesOffset === 0 ? "Chargement des films…" : "Chargement de la suite…";

	      const from = moviesOffset;
	      const to = moviesOffset + PAGE_SIZE;
	      const { data, error } = await moviesClient
	        .from("user_items")
	        .select("*")
	        .eq("media_type", "movie")
	        .eq("user_id", moviesUser.id)
	        .order("updated_at", { ascending: false })
	        .range(from, to);

	      if (error) {
	        moviesStatus.textContent = "Impossible de charger les films.";
	        isLoadingMovies = false;
	        return;
	      }

	      const movies = (data || []).slice(0, PAGE_SIZE);
	      hasMoreMovies = (data || []).length > PAGE_SIZE;
	      moviesOffset += movies.length;

	      if (!movies.length && moviesOffset === 0) {
	        moviesStatus.textContent = "Aucun film ajouté.";
	        isLoadingMovies = false;
	        return;
	      }

	      movies.forEach((item) => moviesList.appendChild(createMovieCard(item)));
	      moviesStatus.textContent = "";
	      await backfillMissingPosters(moviesClient, movies, "movie");
	      isLoadingMovies = false;
	    }

    async function backfillMissingPosters(client, items, mediaType) {
      const missingItems = items.filter((item) => item.id && item.tvdb_id && !item.image_url);
      if (!missingItems.length) return false;

      let didUpdate = false;
      for (const item of missingItems) {
        try {
          const details = await fetchTheTvdbDetails(client, item.tvdb_id, mediaType);
          if (!details.image_url) continue;

          item.image_url = details.image_url;
          didUpdate = true;

	          await client
	            .from("user_items")
	            .update({ image_url: details.image_url })
	            .eq("id", item.id);
	          updatePosterImage(item);
	        } catch (_error) {
	          // Garde le placeholder si TheTVDB ne renvoie pas d'affiche.
	        }
      }

	      return didUpdate;
	    }

	    async function refreshPosterForItem(item, mediaType, image) {
	      if (!moviesClient || image.dataset.posterRetry === "1") return;
	      image.dataset.posterRetry = "1";

	      try {
	        const details = await fetchTheTvdbDetails(moviesClient, item.tvdb_id, mediaType);
	        if (!details.image_url || details.image_url === item.image_url) return;

	        item.image_url = details.image_url;
	        image.src = details.image_url;
	        if (item.id) {
	          await moviesClient
	            .from("user_items")
	            .update({ image_url: details.image_url })
	            .eq("id", item.id);
	        }
	      } catch (_error) {
	        // Le titre reste visible si aucune affiche récupérable.
	      }
	    }

	    function updatePosterImage(item) {
	      const image = [...moviesList.querySelectorAll("img[data-item-id]")]
	        .find((candidate) => candidate.dataset.itemId === String(item.id || ""));
	      if (image && item.image_url) image.src = item.image_url;
	    }

    async function fetchTheTvdbDetails(client, tvdbId, mediaType) {
      const endpoint = mediaType === "movie"
        ? `movies/${encodeURIComponent(normalizeTvdbId(tvdbId))}/extended`
        : `series/${encodeURIComponent(normalizeTvdbId(tvdbId))}/extended`;
      const { data, error } = await client.functions.invoke("tvdb-search", { body: { endpoint } });
      if (error) throw error;

      const payload = data?.data || data;
      const artwork = findPrimaryTheTvdbArtwork(payload);
      return {
        image_url: normalizeTheTvdbImageUrl(
          payload?.image ||
          payload?.image_url ||
          payload?.poster ||
          payload?.poster_url ||
          artwork?.image ||
          artwork?.thumbnail ||
          artwork?.url
        )
      };
    }

    function findPrimaryTheTvdbArtwork(payload) {
      const artworks = Array.isArray(payload?.artworks) ? payload.artworks : [];
      return artworks.find((artwork) => {
        const type = String(artwork?.type || artwork?.typeName || artwork?.artworkType || "").toLowerCase();
        return type.includes("poster") || type.includes("cover");
      }) || artworks[0] || null;
    }

    function normalizeTheTvdbImageUrl(value) {
      if (!value) return null;
      const url = String(value);
      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      if (url.startsWith("/")) return `https://artworks.thetvdb.com${url}`;
      return `https://artworks.thetvdb.com/banners/${url}`;
    }

    function normalizeTvdbId(value) {
      const match = String(value || "").match(/\d+/);
      return match ? match[0] : "";
    }

    loadMovies();
  </script>
</body>
</html>
