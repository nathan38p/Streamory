<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Séries — Streamory</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.series-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 16px;
  width: 100%;
}

.series-grid .profile-poster-item {
  width: 100%;
  min-width: 0;
}

.series-grid .profile-poster-item img {
  display: block;
  width: 100%;
  aspect-ratio: 2 / 3;
  object-fit: cover;
}

@media (max-width: 640px) {
  .series-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
</style>
</head>
<body>
  <main class="app-shell full-shell">
    <header class="topbar">
      <div>
        <h1 id="siteTitle" style="cursor:pointer;" onclick="window.location.href='app.html'">Streamory</h1>
      </div>
      <div class="header-actions">
        <button class="icon-button notification-button" type="button" aria-label="Notifications" hidden>🔔</button>
        <button class="icon-button" type="button" aria-label="Profil" onclick="window.location.href='profile.html'" style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#1a1d22;">👤</button>
      </div>
    </header>

    <section class="library">
      <div class="section-title">
        <h1>Séries</h1>
        <button class="icon-button" type="button" aria-label="Retour au profil" onclick="window.location.href='profile.html'">←</button>
      </div>

	      <p class="muted" id="seriesStatus">Chargement des séries…</p>
	      <div class="series-grid" id="seriesList"></div>
	      <div class="scroll-sentinel" id="seriesScrollSentinel" aria-hidden="true"></div>
	    </section>
	  </main>


  <script>
	    const seriesList = document.getElementById("seriesList");
	    const seriesStatus = document.getElementById("seriesStatus");
	    const seriesScrollSentinel = document.getElementById("seriesScrollSentinel");
	    const PAGE_SIZE = 40;
	    const seriesStatusFilter = new URLSearchParams(window.location.search).get("status") === "watchlist" ? "watchlist" : "";
	    let seriesClient = null;
	    let seriesUser = null;
	    let seriesOffset = 0;
	    let hasMoreSeries = true;
	    let isLoadingSeries = false;

	    function posterPlaceholder(title = "Sans titre") {
      const lines = splitPlaceholderTitle(title);
      const lineHeight = 18;
      const startY = 120 - ((lines.length - 1) * lineHeight) / 2;
      const text = lines.map((line, index) => (
        `<text x="80" y="${startY + index * lineHeight}" text-anchor="middle">${escapeSvgText(line)}</text>`
      )).join("");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="240" viewBox="0 0 160 240"><rect width="160" height="240" fill="#20242a"/><g fill="#f4f6fb" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">${text}</g></svg>`;
      return `data:image/svg+xml,${encodeURIComponent(svg)}`;
    }

    function splitPlaceholderTitle(value) {
      const words = String(value || "Sans titre").trim().split(/\s+/);
      const lines = [];
      let line = "";
      words.forEach((word) => {
        const nextLine = line ? `${line} ${word}` : word;
        if (nextLine.length <= 14) {
          line = nextLine;
          return;
        }
        if (line) lines.push(line);
        line = word;
      });
      if (line) lines.push(line);
      return (lines.length ? lines : ["Sans titre"]).slice(0, 4);
    }

    function escapeSvgText(value) {
      return String(value).replace(/[&<>"']/g, (char) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]
      ));
    }

    function createSeriesCard(item) {
      const figure = document.createElement("figure");
      figure.className = "profile-poster-item";

	      const image = document.createElement("img");
	      image.dataset.itemId = String(item.id || "");
	      image.src = item.image_url || posterPlaceholder(item.title);
	      image.alt = item.title ? `Affiche de ${item.title}` : "Affiche";
	      image.loading = "lazy";
	      image.addEventListener("error", () => {
	        image.src = posterPlaceholder(item.title);
	        refreshPosterForItem(item, "series", image);
	      }, { once: true });

      const link = document.createElement("a");
      link.href = `tvshow.html?id=${encodeURIComponent(item.tvdb_id)}`;
      link.setAttribute("aria-label", `Voir ${item.title || "cette série"}`);
      link.append(image);

      figure.append(link);
      return figure;
    }

    function getSupabaseClient() {
      if (window.streamoryClient) return window.streamoryClient;
      if (window.supabaseClient) return window.supabaseClient;
      if (window.profileClient) return window.profileClient;

      const url = window.CONFIG?.SUPABASE_URL;
      const key = window.CONFIG?.SUPABASE_ANON_KEY;

      if (!window.supabase || !url || !key) return null;

      const client = window.supabase.createClient(url, key);
      window.streamoryClient = client;
      window.supabaseClient = client;
      return client;
    }

	    async function loadSeriesToContinue() {
	      seriesClient = getSupabaseClient();

	      if (!seriesClient) {
	        seriesStatus.textContent = "Connexion Supabase introuvable.";
	        return;
	      }

	      const { data: authData, error: authError } = await seriesClient.auth.getUser();
	      seriesUser = authData?.user;

	      if (authError || !seriesUser) {
	        window.location.href = "index.html";
	        return;
	      }

	      seriesList.innerHTML = "";
	      seriesOffset = 0;
	      hasMoreSeries = true;
	      observeSeriesScroll();
	      await loadNextSeriesPage();
	    }

	    function observeSeriesScroll() {
	      if (!seriesScrollSentinel || !("IntersectionObserver" in window)) return;
	      const observer = new IntersectionObserver((entries) => {
	        if (entries.some((entry) => entry.isIntersecting)) loadNextSeriesPage();
	      }, { rootMargin: "600px 0px" });
	      observer.observe(seriesScrollSentinel);
	    }

	    async function loadNextSeriesPage() {
	      if (isLoadingSeries || !hasMoreSeries || !seriesClient || !seriesUser) return;
	      isLoadingSeries = true;
	      seriesStatus.textContent = seriesOffset === 0 ? `Chargement des ${getSeriesPageLabel().toLowerCase()}…` : "Chargement de la suite…";

	      const from = seriesOffset;
	      const to = seriesOffset + PAGE_SIZE;
	      let query = seriesClient
	        .from("user_items")
	        .select("*")
	        .eq("media_type", "series")
	        .eq("user_id", seriesUser.id)
	        .order("updated_at", { ascending: false });
	      if (seriesStatusFilter) query = query.eq("status", seriesStatusFilter);
	      const { data, error } = await query.range(from, to);

	      if (error) {
	        seriesStatus.textContent = "Impossible de charger les séries.";
	        isLoadingSeries = false;
	        return;
	      }

	      const series = (data || []).slice(0, PAGE_SIZE);
	      hasMoreSeries = (data || []).length > PAGE_SIZE;
	      seriesOffset += series.length;

	      if (!series.length && seriesOffset === 0) {
	        seriesStatus.textContent = seriesStatusFilter ? "Aucune série à voir." : "Aucune série ajoutée.";
	        isLoadingSeries = false;
	        return;
	      }

	      series.forEach((item) => seriesList.appendChild(createSeriesCard(item)));
	      seriesStatus.textContent = hasMoreSeries ? "" : "";
	      isLoadingSeries = false;
	      await backfillMissingPosters(seriesClient, series, "series");
	      loadNextSeriesPageIfNeeded();
	    }

	    function loadNextSeriesPageIfNeeded() {
	      if (!hasMoreSeries || !seriesScrollSentinel) return;
	      requestAnimationFrame(() => {
	        const bounds = seriesScrollSentinel.getBoundingClientRect();
	        if (bounds.top < window.innerHeight + 600) loadNextSeriesPage();
	      });
	    }

	    function configureSeriesPage() {
	      const title = getSeriesPageLabel();
	      document.title = `${title} — Streamory`;
	      const heading = document.querySelector(".library .section-title h1");
	      if (heading) heading.textContent = title;
	      if (seriesStatus) seriesStatus.textContent = `Chargement des ${title.toLowerCase()}…`;
	    }

	    function getSeriesPageLabel() {
	      return seriesStatusFilter ? "Séries à voir" : "Séries";
	    }

    async function backfillMissingPosters(client, items, mediaType) {
      const missingItems = items.filter((item) => item.id && item.tvdb_id && !item.image_url);
      if (!missingItems.length) return false;

      let didUpdate = false;
      for (const item of missingItems) {
        try {
          const details = await fetchTheTvdbDetails(client, item.tvdb_id, mediaType);
          if (!details.image_url) continue;

	          item.image_url = details.image_url;
	          didUpdate = true;

          await client
            .from("user_items")
	            .update({ image_url: details.image_url })
	            .eq("id", item.id);
	          updatePosterImage(item);
	        } catch (_error) {
	          // Garde le placeholder si TheTVDB ne renvoie pas d'affiche.
	        }
      }

	      return didUpdate;
	    }

	    async function refreshPosterForItem(item, mediaType, image) {
	      if (!seriesClient || image.dataset.posterRetry === "1") return;
	      image.dataset.posterRetry = "1";

	      try {
	        const details = await fetchTheTvdbDetails(seriesClient, item.tvdb_id, mediaType);
	        if (!details.image_url || details.image_url === item.image_url) return;

	        item.image_url = details.image_url;
	        image.src = details.image_url;
	        if (item.id) {
	          await seriesClient
	            .from("user_items")
	            .update({ image_url: details.image_url })
	            .eq("id", item.id);
	        }
	      } catch (_error) {
	        // Le titre reste visible si aucune affiche récupérable.
	      }
	    }

	    function updatePosterImage(item) {
	      const image = [...seriesList.querySelectorAll("img[data-item-id]")]
	        .find((candidate) => candidate.dataset.itemId === String(item.id || ""));
	      if (image && item.image_url) image.src = item.image_url;
	    }

    async function fetchTheTvdbDetails(client, tvdbId, mediaType) {
      const endpoint = mediaType === "movie"
        ? `movies/${encodeURIComponent(normalizeTvdbId(tvdbId))}/extended`
        : `series/${encodeURIComponent(normalizeTvdbId(tvdbId))}/extended`;
      const { data, error } = await client.functions.invoke("tvdb-search", { body: { endpoint } });
      if (error) throw error;

      const payload = data?.data || data;
      const artwork = findPrimaryTheTvdbArtwork(payload);
      return {
        image_url: normalizeTheTvdbImageUrl(
          payload?.image ||
          payload?.image_url ||
          payload?.poster ||
          payload?.poster_url ||
          artwork?.image ||
          artwork?.thumbnail ||
          artwork?.url
        )
      };
    }

    function findPrimaryTheTvdbArtwork(payload) {
      const artworks = Array.isArray(payload?.artworks) ? payload.artworks : [];
      return artworks.find((artwork) => {
        const type = String(artwork?.type || artwork?.typeName || artwork?.artworkType || "").toLowerCase();
        return type.includes("poster") || type.includes("cover");
      }) || artworks[0] || null;
    }

    function normalizeTheTvdbImageUrl(value) {
      if (!value) return null;
      const url = String(value);
      if (url.startsWith("http://") || url.startsWith("https://")) return url;
      if (url.startsWith("/")) return `https://artworks.thetvdb.com${url}`;
      return `https://artworks.thetvdb.com/banners/${url}`;
    }

    function normalizeTvdbId(value) {
      const match = String(value || "").match(/\d+/);
      return match ? match[0] : "";
    }

	    configureSeriesPage();
	    loadSeriesToContinue();
  </script>
</body>
</html>
