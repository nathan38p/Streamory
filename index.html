<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050607" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#050607">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Streamory">
    <title>Streamory — Connexion</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell auth-shell">
      <header class="topbar">
        <div>
          <h1 id="siteTitle">Streamory</h1>
        </div>
      </header>

      <main>
        <section class="auth-panel" id="authPanel">
          <div class="auth-tabs" role="tablist" aria-label="Authentification">
            <button class="auth-tab active" id="showLoginButton" type="button">Connexion</button>
            <button class="auth-tab" id="showSignupButton" type="button">Inscription</button>
          </div>

          <form id="loginForm" class="stack">
            <label>
              Email
              <input id="loginEmailInput" type="email" autocomplete="username" required>
            </label>
            <label>
              Mot de passe
              <input id="loginPasswordInput" type="password" autocomplete="current-password" minlength="6" required>
            </label>
            <button class="primary-button" id="loginButton" type="submit">Se connecter</button>
            <p class="message" id="loginMessage"></p>
          </form>

          <form id="signupForm" class="stack" hidden>
            <label>
              Display name
              <input id="usernameInput" type="text" autocomplete="nickname" inputmode="latin" minlength="3" maxlength="28" pattern="[a-z0-9]{3,28}" required>
            </label>
            <label>
              Email
              <input id="signupEmailInput" type="email" autocomplete="username" required>
            </label>
            <label>
              Mot de passe
              <input id="signupPasswordInput" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <label>
              Confirmer le mot de passe
              <input id="confirmPasswordInput" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <label>
              Date de naissance
              <input id="birthDateInput" type="text" inputmode="numeric" autocomplete="bday" maxlength="10" placeholder="JJ/MM/AAAA" required>
            </label>
            <label>
              Pays
              <select id="countryInput" required>
                <option value="">Choisir un pays</option>
              </select>
            </label>
            <button class="primary-button" id="signupButton" type="submit">Créer mon compte</button>
            <p class="message" id="signupMessage"></p>
          </form>
        </section>
      </main>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
  </body>
</html>
