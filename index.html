<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#101214">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Streamory">
    <title>Streamory</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1 id="siteTitle">Streamory</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="Réglages" hidden>⚙</button>
      </header>

      <main>
        <section class="auth-panel" id="authPanel">
          <div class="auth-tabs" role="tablist" aria-label="Authentification">
            <button class="auth-tab active" id="showLoginButton" type="button">Connexion</button>
            <button class="auth-tab" id="showSignupButton" type="button">Inscription</button>
          </div>

          <form id="loginForm" class="stack">
            <label>
              Email
              <input id="loginEmailInput" type="email" autocomplete="username" required>
            </label>
            <label>
              Mot de passe
              <input id="loginPasswordInput" type="password" autocomplete="current-password" minlength="6" required>
            </label>
            <button class="primary-button" id="loginButton" type="submit">Se connecter</button>
            <p class="message" id="loginMessage"></p>
          </form>

          <form id="signupForm" class="stack" hidden>
            <label>
              Nom d'utilisateur
              <input id="usernameInput" type="text" autocomplete="nickname" minlength="3" maxlength="28" required>
            </label>
            <label>
              Email
              <input id="signupEmailInput" type="email" autocomplete="username" required>
            </label>
            <label>
              Mot de passe
              <input id="signupPasswordInput" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <label>
              Confirmer le mot de passe
              <input id="confirmPasswordInput" type="password" autocomplete="new-password" minlength="6" required>
            </label>
            <label>
              Date de naissance
              <input id="birthDateInput" type="text" inputmode="numeric" autocomplete="bday" maxlength="10" placeholder="JJ/MM/AAAA" required>
            </label>
            <label>
              Pays
              <select id="countryInput" required>
                <option value="">Choisir un pays</option>
              </select>
            </label>
            <button class="primary-button" id="signupButton" type="submit">Créer mon compte</button>
            <p class="message" id="signupMessage"></p>
          </form>
        </section>

        <section class="controls" id="appControls" hidden>
          <div class="search-box">
            <label for="searchInput">Recherche TheTVDB</label>
            <div class="search-row">
              <input id="searchInput" type="search" placeholder="The Bear, Severance, Dune...">
              <button class="primary-button" id="searchButton" type="button">Chercher</button>
            </div>
          </div>
          <div class="segmented" role="tablist" aria-label="Type de média">
            <button class="segment active" type="button" data-type="series">Séries</button>
            <button class="segment" type="button" data-type="movie">Films</button>
          </div>
        </section>

        <section class="search-results" id="searchResults" hidden>
          <div class="section-title">
            <h2>Résultats</h2>
            <button class="text-button" id="clearResultsButton" type="button">Effacer</button>
          </div>
          <div class="media-list" id="resultsList"></div>
        </section>

        <section class="library" id="libraryPanel" hidden>
          <div class="section-title">
            <h2>Ma liste</h2>
          </div>
          <div class="filters" aria-label="Filtres">
            <button class="filter active" type="button" data-status="all">Tout</button>
            <button class="filter" type="button" data-status="watchlist">À voir</button>
            <button class="filter" type="button" data-status="watching">En cours</button>
            <button class="filter" type="button" data-status="watched">Vu</button>
          </div>
          <div class="empty-state" id="emptyState">
            <h3>Ta liste est vide</h3>
            <p>Recherche un film ou une série pour l’ajouter.</p>
          </div>
          <div class="media-list" id="libraryList"></div>
        </section>
      </main>
    </div>

    <dialog class="settings-dialog" id="settingsDialog">
      <form method="dialog" class="settings-content">
        <div class="section-title">
          <h2>Réglages</h2>
          <button class="icon-button" value="close" aria-label="Fermer">×</button>
        </div>
        <p class="hint" id="accountDetails">Connecte-toi pour gérer ton compte.</p>
        <button class="secondary-button danger-button" id="settingsLogoutButton" type="button">Se déconnecter</button>
        <p class="message" id="settingsMessage"></p>
      </form>
    </dialog>

    <template id="mediaCardTemplate">
      <article class="media-card">
        <img class="poster" alt="">
        <div class="media-body">
          <div>
            <p class="media-kind"></p>
            <h3 class="media-title"></h3>
            <p class="media-meta"></p>
            <p class="media-overview"></p>
          </div>
          <div class="card-actions"></div>
        </div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
