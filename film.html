<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Film — Streamory</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .detail-shell { width: min(100%, 920px); }
    .detail-hero { display: grid; grid-template-columns: minmax(110px, 180px) 1fr; gap: 18px; align-items: start; }
    .detail-heading-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .detail-heading-row h2 { margin-right: auto; }
    .detail-poster { width: 100%; aspect-ratio: 2 / 3; border-radius: 8px; background: var(--panel-soft); object-fit: cover; }
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 14px; color: var(--muted); font-size: 0.9rem; }
    .movie-watch-list { grid-column: 1 / -1; margin-top: 4px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: rgba(255, 255, 255, 0.02); }
    .watched-row { display: grid; grid-template-columns: 64px 1fr auto; gap: 10px; align-items: start; min-height: 56px; padding: 10px 12px; background: var(--panel); color: var(--text); cursor: pointer; }
    .watched-row input { position: absolute; opacity: 0; pointer-events: none; }
    .movie-watch-number { align-self: center; color: var(--muted); font-size: 0.78rem; font-weight: 900; }
    .movie-watch-title { display: block; margin: 0 0 3px; color: var(--text); font-size: 0.94rem; font-weight: 850; line-height: 1.25; }
    .movie-watch-meta { display: block; margin: 0; color: var(--muted); font-size: 0.78rem; font-weight: 700; line-height: 1.25; }
    .movie-watch-state { align-self: center; min-width: 72px; border: 1px solid var(--line); border-radius: 999px; padding: 7px 10px; background: var(--panel-soft); color: var(--muted); font-size: 0.78rem; font-weight: 900; text-align: center; }
    .watched-row.is-watched .movie-watch-state { background: #22c55e; color: #07130b; border-color: #22c55e; }
    .movie-choice-backdrop { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; padding: 20px; background: rgba(0, 0, 0, 0.55); }
    .movie-choice-box { width: min(100%, 340px); border: 1px solid var(--line); border-radius: 14px; padding: 18px; background: var(--panel); box-shadow: 0 22px 50px rgba(0, 0, 0, 0.35); }
    .movie-choice-box p { margin: 0 0 14px; color: var(--text); font-weight: 800; }
    .movie-choice-actions { display: grid; gap: 10px; }
    .movie-choice-actions button { border: 1px solid var(--line); border-radius: 999px; padding: 10px 12px; background: var(--panel-soft); color: var(--text); font-weight: 900; cursor: pointer; }
    .movie-choice-actions button[data-action="unwatch"] { color: var(--muted); }
    @media (max-width: 620px) { .detail-hero { grid-template-columns: 92px 1fr; } }
  </style>
</head>
<body>
  <div class="app-shell detail-shell">
    <header class="topbar">
      <div>
        <h1 id="siteTitle" style="cursor:pointer;" onclick="window.location.href='app.html'">Streamory</h1>
      </div>
      <div class="header-actions">
        <button class="icon-button notification-button" id="notificationsButton" type="button" aria-label="Notifications" hidden>🔔<span id="notificationsBadge" class="notification-badge" hidden>0</span></button>
        <button class="icon-button" id="profileButton" type="button" aria-label="Profil" style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#1a1d22;">👤</button>
      </div>
    </header>

    <main>
      <section class="library">
        <p class="message" id="movieStatus">Chargement du film...</p>

        <div class="detail-hero" id="movieContent" hidden>
          <img class="detail-poster" id="moviePoster" alt="Affiche" />
          <div>
            <div class="detail-heading-row">
              <div>
                <p class="eyebrow">Film</p>
                <h2 id="movieHeading"></h2>
              </div>
              <button class="icon-button" type="button" aria-label="Retour" onclick="history.back()">←</button>
            </div>
            <div class="detail-meta" id="movieMeta"></div>
            <p class="media-overview" id="movieOverview"></p>
            <button class="overview-toggle" id="movieOverviewToggle" type="button" hidden>Afficher plus</button>
          </div>
          <div class="movie-watch-list">
            <label class="watched-row" id="movieWatchedLabel">
              <span class="movie-watch-number">Film</span>
              <span>
                <span class="movie-watch-title" id="movieWatchTitle">Film</span>
                <span class="movie-watch-meta" id="movieWatchMeta">Long-métrage</span>
              </span>
              <span class="movie-watch-state" id="movieWatchedText">À voir</span>
              <input id="movieWatched" type="checkbox" />
            </label>
          </div>
        </div>
      </section>
    </main>

    <dialog class="settings-dialog" id="notificationsDialog">
      <form method="dialog" class="settings-content">
        <div class="section-title">
          <h2>Notifications</h2>
          <button class="icon-button" value="close" aria-label="Fermer">×</button>
        </div>
        <div class="social-list" id="notificationsList"></div>
      </form>
    </dialog>
  </div>

  <script>
    const POSTER_BASE = "https://artworks.thetvdb.com";
    const DETAIL_COUNTRY_LANGUAGE_CODES = {
      FR: "fra",
      BE: "nld",
      CH: "deu",
      CA: "eng",
      US: "eng",
      GB: "eng",
      ES: "spa",
      IT: "ita",
      DE: "deu",
      PT: "por"
    };
    const rawTvdbId = new URLSearchParams(window.location.search).get("id");
    const tvdbId = normalizeTvdbId(rawTvdbId);
    const els = {
      status: document.getElementById("movieStatus"),
      content: document.getElementById("movieContent"),
      heading: document.getElementById("movieHeading"),
      poster: document.getElementById("moviePoster"),
      meta: document.getElementById("movieMeta"),
      overview: document.getElementById("movieOverview"),
      overviewToggle: document.getElementById("movieOverviewToggle"),
      watched: document.getElementById("movieWatched"),
      watchedLabel: document.getElementById("movieWatchedLabel"),
      watchedText: document.getElementById("movieWatchedText"),
      watchTitle: document.getElementById("movieWatchTitle"),
      watchMeta: document.getElementById("movieWatchMeta"),
      profileButton: document.getElementById("profileButton"),
      notificationsButton: document.getElementById("notificationsButton"),
      notificationsBadge: document.getElementById("notificationsBadge"),
      notificationsDialog: document.getElementById("notificationsDialog"),
      notificationsList: document.getElementById("notificationsList")
    };
    let client;
    let user;
    let movieDetails;
    let movieWatchCount = 0;
    let notifications = [];

    function posterPlaceholder(title = "Sans titre") {
      const lines = splitPlaceholderTitle(title);
      const lineHeight = 18;
      const startY = 120 - ((lines.length - 1) * lineHeight) / 2;
      const text = lines.map((line, index) => (
        `<text x="80" y="${startY + index * lineHeight}" text-anchor="middle">${escapeSvgText(line)}</text>`
      )).join("");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="240" viewBox="0 0 160 240"><rect width="160" height="240" fill="#20242a"/><g fill="#f4f6fb" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">${text}</g></svg>`;
      return `data:image/svg+xml,${encodeURIComponent(svg)}`;
    }

    function splitPlaceholderTitle(value) {
      const words = String(value || "Sans titre").trim().split(/\s+/);
      const lines = [];
      let line = "";
      words.forEach((word) => {
        const nextLine = line ? `${line} ${word}` : word;
        if (nextLine.length <= 14) {
          line = nextLine;
          return;
        }
        if (line) lines.push(line);
        line = word;
      });
      if (line) lines.push(line);
      return (lines.length ? lines : ["Sans titre"]).slice(0, 4);
    }

    function escapeSvgText(value) {
      return String(value).replace(/[&<>"']/g, (char) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]
      ));
    }

    function getSupabaseClient() {
      if (window.streamoryClient) return window.streamoryClient;
      const url = window.CONFIG?.SUPABASE_URL;
      const key = window.CONFIG?.SUPABASE_ANON_KEY;
      if (!window.supabase || !url || !key) return null;
      window.streamoryClient = window.supabase.createClient(url, key);
      return window.streamoryClient;
    }

    async function init() {
      if (!rawTvdbId || !tvdbId) {
        els.status.textContent = "Aucun identifiant TVDB dans l'URL.";
        return;
      }

      client = getSupabaseClient();
      if (!client) {
        els.status.textContent = "Connexion Supabase introuvable.";
        return;
      }

      const { data: authData, error: authError } = await client.auth.getUser();
      user = authData?.user;
      if (authError || !user) {
        window.location.href = "index.html";
        return;
      }

      els.profileButton?.addEventListener("click", () => {
        window.location.href = "profile.html";
      });
      els.notificationsButton?.addEventListener("click", () => {
        renderNotifications();
        els.notificationsDialog?.showModal();
      });
      await loadFriendNotifications();

      try {
        const [details, itemResult] = await Promise.all([
          fetchTvdbEndpoint(`movies/${encodeURIComponent(tvdbId)}/extended?meta=translations`),
          client.from("user_items").select("*").eq("user_id", user.id).in("tvdb_id", getPossibleTvdbIds()).eq("media_type", "movie").limit(1).maybeSingle()
        ]);
        movieDetails = normalizeMovie(details?.data || details);
        renderMovie(itemResult.data);
      } catch (error) {
        els.status.textContent = `Impossible de charger le film: ${getErrorMessage(error)}`;
      }
    }

    async function loadFriendNotifications() {
      const { data, error } = await client.rpc("list_streamory_friend_notifications");
      notifications = error ? [] : data || [];
      renderNotificationBadge();
    }

    function renderNotificationBadge() {
      const count = notifications.length;
      if (els.notificationsButton) els.notificationsButton.hidden = count === 0;
      if (els.notificationsBadge) {
        els.notificationsBadge.hidden = count === 0;
        els.notificationsBadge.textContent = String(count);
      }
    }

    function renderNotifications() {
      if (!els.notificationsList) return;
      els.notificationsList.innerHTML = "";
      if (!notifications.length) {
        els.notificationsList.append(createSocialMessage("Aucune notification."));
        return;
      }

      notifications.forEach((notification) => {
        const item = document.createElement("div");
        item.className = "social-item";
        const username = notification.username || "Utilisateur";
        item.innerHTML = `
          <div class="social-user">
            <div class="social-avatar">👤</div>
            <div>
              <p class="social-name">${escapeHtml(username)}</p>
              <p class="social-meta">Demande d'ami</p>
            </div>
          </div>
        `;
        els.notificationsList.append(item);
      });
    }

    function createSocialMessage(message) {
      const element = document.createElement("p");
      element.className = "message";
      element.textContent = message;
      return element;
    }

    async function fetchTvdbEndpoint(endpoint) {
      const { data, error } = await client.functions.invoke("tvdb-search", { body: { endpoint } });
      if (error) throw error;
      if (data?.error) throw new Error(data.error);
      return data;
    }

    function normalizeMovie(payload) {
      const title = payload?.name || payload?.title || "Film sans titre";
      const language = getCurrentTvdbLanguage();
      return {
        title,
        year: extractYear(payload?.released || payload?.releaseDate || payload?.firstAired || payload?.year),
        runtime: payload?.runtime || payload?.runtimeMinutes,
        genres: (payload?.genres || []).map((genre) => genre.name || genre).filter(Boolean).slice(0, 4),
        overview: pickLocalizedValue(payload, ["overview", "description"], language),
        imageUrl: normalizeImage(payload?.image || payload?.poster || payload?.poster_url || findArtwork(payload))
      };
    }

    function getCurrentTvdbLanguage() {
      return getTvdbLanguageForCountry(user?.user_metadata?.country || "FR");
    }

    function getTvdbLanguageForCountry(country) {
      return DETAIL_COUNTRY_LANGUAGE_CODES[String(country || "").toUpperCase()] || "eng";
    }

    function pickLocalizedValue(item, fields, language) {
      const translations = item?.translations || {};
      const languageValue = getTranslationValue(translations, language, fields);
      if (languageValue) return languageValue;

      const englishValue = getTranslationValue(translations, "eng", fields);
      if (englishValue) return englishValue;

      for (const field of fields) {
        if (item?.[field]) return item[field];
      }

      return "";
    }

    function getTranslationValue(translations, language, fields) {
      if (!translations || !language) return "";
      const normalizedLanguage = normalizeLanguageCode(language);
      const directTranslation = !Array.isArray(translations) && typeof translations === "object"
        ? translations[language] || translations[normalizedLanguage]
        : null;
      const directValue = normalizeTranslationValue(directTranslation, fields);
      if (directValue) return directValue;

      const translationList = collectTranslationList(translations);
      const languageTranslation = translationList.find((translation) => {
        return [
          translation?.language,
          translation?.language_code,
          translation?.iso_639_2,
          translation?.iso639_2
        ].filter(Boolean).map(normalizeLanguageCode).includes(normalizedLanguage);
      });

      return normalizeTranslationValue(languageTranslation, fields);
    }

    function collectTranslationList(translations) {
      if (Array.isArray(translations)) return translations;
      if (!translations || typeof translations !== "object") return [];
      return Object.values(translations).flatMap((value) => Array.isArray(value) ? value : []);
    }

    function normalizeTranslationValue(translation, fields) {
      if (!translation) return "";
      if (typeof translation === "string") return translation;

      for (const field of fields) {
        if (translation[field]) return translation[field];
      }

      return "";
    }

    function normalizeLanguageCode(value) {
      return String(value || "").toLowerCase();
    }

    function renderMovie(savedItem) {
      document.title = `${movieDetails.title} — Streamory`;
      els.heading.textContent = movieDetails.title;
      els.poster.src = movieDetails.imageUrl || posterPlaceholder(movieDetails.title);
      els.poster.alt = `Affiche de ${movieDetails.title}`;
      els.poster.addEventListener("error", () => { els.poster.src = posterPlaceholder(movieDetails.title); }, { once: true });
      els.meta.textContent = [movieDetails.year, movieDetails.runtime ? `${movieDetails.runtime} min` : "", ...movieDetails.genres].filter(Boolean).join(" · ");
      els.overview.textContent = movieDetails.overview || "Aucun résumé disponible.";
      if (els.watchTitle) els.watchTitle.textContent = movieDetails.title;
      if (els.watchMeta) els.watchMeta.textContent = [movieDetails.year, movieDetails.runtime ? `${movieDetails.runtime} min` : ""].filter(Boolean).join(" · ") || "Long-métrage";
      movieWatchCount = getInitialMovieWatchCount(savedItem);
      els.watched.checked = movieWatchCount > 0;
      updateMovieWatchedState();
      els.watchedLabel?.addEventListener("click", handleMovieWatchedClick);
      els.status.textContent = "";
      els.content.hidden = false;
      setupExpandableOverview(els.overview, els.overviewToggle);
    }

    function setupExpandableOverview(overview, toggle) {
      if (!overview || !toggle) return;
      overview.classList.remove("is-expanded");
      toggle.textContent = "Afficher plus";
      toggle.hidden = true;

      requestAnimationFrame(() => {
        const isOverflowing = overview.scrollHeight > overview.clientHeight + 1;
        toggle.hidden = !isOverflowing;
      });

      toggle.onclick = () => {
        const isExpanded = overview.classList.toggle("is-expanded");
        toggle.textContent = isExpanded ? "Réduire" : "Afficher plus";
      };
    }

    async function handleMovieWatchedClick(event) {
      event.preventDefault();
      if (els.watched.disabled) return;
      if (movieWatchCount > 0) {
        showMovieWatchedChoice();
        return;
      }
      await saveMovieWatchCount(1);
    }

    async function saveMovieWatchCount(nextWatchCount) {
      const previousWatchCount = movieWatchCount;
      els.watched.disabled = true;
      movieWatchCount = Math.max(0, Number(nextWatchCount) || 0);
      els.watched.checked = movieWatchCount > 0;
      updateMovieWatchedState();
      const status = movieWatchCount > 0 ? "watched" : "watchlist";
      const record = {
        user_id: user.id,
        tvdb_id: getStorageTvdbId(),
        media_type: "movie",
        title: movieDetails.title,
        image_url: movieDetails.imageUrl,
        year: movieDetails.year,
        overview: movieDetails.overview,
        status,
        watch_count: movieWatchCount,
        updated_at: new Date().toISOString()
      };
      let { error } = await client.from("user_items").upsert(record, { onConflict: "user_id,tvdb_id,media_type" });
      if (isMissingWatchCountColumnError(error)) {
        const fallbackRecord = { ...record };
        delete fallbackRecord.watch_count;
        ({ error } = await client.from("user_items").upsert(fallbackRecord, { onConflict: "user_id,tvdb_id,media_type" }));
      }
      if (error) {
        movieWatchCount = previousWatchCount;
        els.watched.checked = movieWatchCount > 0;
        els.status.textContent = `Impossible d'enregistrer: ${getErrorMessage(error)}`;
      } else {
        els.status.textContent = "";
        saveLocalMovieWatchCount(movieWatchCount);
      }
      updateMovieWatchedState();
      els.watched.disabled = false;
    }

    function updateMovieWatchedState() {
      const isWatched = movieWatchCount > 0;
      els.watched.checked = isWatched;
      els.watchedLabel?.classList.toggle("is-watched", isWatched);
      if (els.watchedText) els.watchedText.textContent = isWatched ? (movieWatchCount > 1 ? `Vu ×${movieWatchCount}` : "Vu") : "À voir";
    }

    function showMovieWatchedChoice() {
      document.querySelector(".movie-choice-backdrop")?.remove();
      const backdrop = document.createElement("div");
      backdrop.className = "movie-choice-backdrop";
      backdrop.innerHTML = `
        <div class="movie-choice-box" role="dialog" aria-modal="true" aria-label="Modifier le statut du film">
          <p>${escapeHtml(movieDetails.title)} est déjà marqué comme vu. Tu veux le compter comme revu ou le repasser en à voir ?</p>
          <div class="movie-choice-actions">
            <button type="button" data-action="rewatch">Je le revois</button>
            <button type="button" data-action="unwatch">À voir</button>
          </div>
        </div>
      `;

      backdrop.addEventListener("click", (event) => {
        if (event.target === backdrop) backdrop.remove();
      });
      backdrop.querySelector('[data-action="rewatch"]')?.addEventListener("click", async () => {
        backdrop.remove();
        await saveMovieWatchCount(movieWatchCount + 1);
      });
      backdrop.querySelector('[data-action="unwatch"]')?.addEventListener("click", async () => {
        backdrop.remove();
        await saveMovieWatchCount(0);
      });

      document.body.append(backdrop);
      backdrop.querySelector('[data-action="rewatch"]')?.focus();
    }

    function getInitialMovieWatchCount(savedItem) {
      if (savedItem && savedItem.status !== "watched") return 0;
      const savedCount = Number(savedItem?.watch_count || 0);
      if (savedCount > 0) return savedCount;
      const localCount = getLocalMovieWatchCount();
      if (localCount > 0) return localCount;
      return savedItem?.status === "watched" ? 1 : 0;
    }

    function getLocalMovieWatchCount() {
      return Number(localStorage.getItem(getMovieWatchCountStorageKey()) || 0);
    }

    function saveLocalMovieWatchCount(count) {
      const key = getMovieWatchCountStorageKey();
      if (count > 0) localStorage.setItem(key, String(count));
      else localStorage.removeItem(key);
    }

    function getMovieWatchCountStorageKey() {
      return `streamory:movie-watch-count:${user.id}:${getStorageTvdbId()}`;
    }

    function isMissingWatchCountColumnError(error) {
      const message = getErrorMessage(error).toLowerCase();
      return Boolean(error) && message.includes("watch_count");
    }

    function extractYear(value) {
      const match = String(value || "").match(/\d{4}/);
      return match ? match[0] : null;
    }

    function findArtwork(payload) {
      const artworks = Array.isArray(payload?.artworks) ? payload.artworks : [];
      const artwork = artworks.find((item) => String(item.typeName || item.type || "").toLowerCase().includes("poster")) || artworks[0];
      return artwork?.image || artwork?.thumbnail || artwork?.url;
    }

    function normalizeImage(value) {
      if (!value) return "";
      const url = String(value);
      if (url.startsWith("http")) return url;
      if (url.startsWith("/")) return `${POSTER_BASE}${url}`;
      return `${POSTER_BASE}/banners/${url}`;
    }

    function normalizeTvdbId(value) {
      const text = String(value || "");
      const match = text.match(/\d+/);
      return match ? match[0] : "";
    }

    function getStorageTvdbId() {
      return rawTvdbId || tvdbId;
    }

    function getPossibleTvdbIds() {
      return [...new Set([rawTvdbId, tvdbId].filter(Boolean).map(String))];
    }

    function getErrorMessage(error) {
      return error?.message || String(error || "Erreur inconnue.");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    init();
  </script>
</body>
</html>
